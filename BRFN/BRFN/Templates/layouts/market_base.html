<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}BRFN{% endblock %}</title>

  <!-- Bootstrap for layout + base components -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Project UI overrides (ui-btn, ui-badge, etc.) -->
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="ui-market">
  {# Marketplace navbar (categories + search) #}
  {% include "partials/market_navbar.html" %}

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
