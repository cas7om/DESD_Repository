<!-- {% load static %}
{# ==========================================================
  DASHBOARD BASE LAYOUT (TEAM NOTE)
  - Used by Producer + Admin dashboard pages
  - Provides: topbar + left sidebar + main content area
  - Keep layout consistent; backend team only binds real data later
========================================================== #} -->
{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Dashboard{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="ui-dash">
  {% include "partials/topbar.html" %}

  <div class="container-fluid">
    <div class="row">

      <aside class="col-12 col-lg-2 border-end min-vh-100 p-3 bg-body-tertiary">
        {% block sidebar %}{% endblock %}
      </aside>

      <main class="col-12 col-lg-10 p-4">

        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
          <h1 class="h4 m-0">{% block page_title %}{% endblock %}</h1>

          <div class="d-flex flex-wrap gap-2">
            {% block page_actions %}{% endblock %}
          </div>
        </div>

        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
