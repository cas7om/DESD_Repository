<!doctype html>
<html>
{% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}BRFN{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'brfn.css' %}">

    <script src="{% static 'brfn.js' %}"></script>
</head>
<body>

    {% include "SharedComponents/header.html" %}

    <main>
        <div class="container" style="max-width: 900px; margin-top: 30px;">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="mt-5 py-4 bg-light border-top">
        <div class="container text-center">
            <small>&copy; 2026 BRFN. All rights reserved.</small>
        </div>
    </footer>

    

    {% if messages %}
    {% for message in messages %}
    {% if forloop.last %}
    <div id="toast" class="toast {{ message.tags }}">
        {{ message }}
    </div>
    {% endif %}
    {% endfor %}
    {% endif %}
</body>
</html>
