<!-- TEAM NOTE:
Reusable product card for home/category/search.
Shows: name, producer, origin, availability, price.
Unavailable products are hidden.
-->

{% if p.availability != "Unavailable" %}
<div class="col-12 col-md-6 col-lg-3">
  <div class="card ui-card h-100">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start">
        <h2 class="h6 mb-1">{{ p.name }}</h2>
        <span class="ui-badge ui-badge--season">{{ p.badge }}</span>
      </div>

      <div class="ui-muted small">{{ p.producer }}</div>

      <div class="mt-2 small">
        <div><span class="ui-muted">Origin:</span> {{ p.origin|default:"—" }}</div>
        <div class="mt-1">
          <span class="ui-muted">Availability:</span>
          {% include "partials/availability_badge.html" with availability=p.availability %}
        </div>
      </div>

      <div class="mt-2 fw-semibold">{{ p.price }}</div>

      <div class="mt-3 d-flex gap-2">
        <a class="ui-btn ui-btn--primary ui-btn--sm" href="/product/{{ p.id }}/">View</a>
        <a class="ui-btn ui-btn--outline ui-btn--sm" href="/category/{{ p.category }}/">Category</a>
      </div>
    </div>
  </div>
</div>
{% endif %}
