  MARKET NAVBAR (TEAM NOTE)
  - Used on customer-facing pages (home/category/search/product_detail)

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">BRFN</a>

    <!-- Mobile toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#marketNav" aria-controls="marketNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="marketNav">
      <!-- Category menu (TC-004) -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/category/vegetables/">Vegetables</a></li>
        <li class="nav-item"><a class="nav-link" href="/category/dairy/">Dairy</a></li>
        <li class="nav-item"><a class="nav-link" href="/category/bakery/">Bakery</a></li>
        <li class="nav-item"><a class="nav-link" href="/category/preserves/">Preserves</a></li>
        <li class="nav-item"><a class="nav-link" href="/category/seasonal/">Seasonal</a></li>
      </ul>

      <!-- Search (TC-005) -->
      <form class="d-flex gap-2 me-lg-3 mb-2 mb-lg-0" action="/search/" method="get">
        <input
          class="form-control"
          name="q"
          placeholder="Search products..."
          value="{{ q|default:'' }}"
        />
        <button class="ui-btn ui-btn--primary ui-btn--sm is-disabled" aria-disabled="true" type="submit">
          Search
        </button>
      </form>

      <!-- Quick role shortcuts (UI-only) -->
      <div class="d-flex gap-2">
        <a class="ui-btn ui-btn--outline ui-btn--sm" href="/producer/products/">Producer</a>
        <a class="ui-btn ui-btn--outline ui-btn--sm" href="/network-admin/commission/">Admin</a>
      </div>
