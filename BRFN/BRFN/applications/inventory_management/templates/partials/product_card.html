<!-- TEAM NOTE:
Reusable product card for home/category/search.
Shows: name, producer (Business), availability, price/unit, category (+optional stock).
Unavailable products are hidden in views.py (availability__is_available=True).
-->

<div class="col-12 col-md-6 col-lg-4">
    <div class="card ui-card h-100">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <h2 class="h6 mb-1">{{ p.name }}</h2>
                <span class="ui-badge ui-badge--success">{{ p.availability.name }}</span>
            </div>

            <div class="ui-muted small">
                {% if p.business.business_name %}
                {{ p.business.business_name }}
                {% else %}
                {{ p.business }}
                {% endif %}
            </div>

            <div class="mt-2 small">
                <div><span class="ui-muted">Origin:</span> —</div>

                {% if p.stock %}
                <div class="mt-1">
                    <span class="ui-muted">Stock:</span> {{ p.stock.quantity }}
                </div>
                {% endif %}
            </div>

            <div class="mt-2 fw-semibold">
                £{{ p.price }}{% if p.unit %} / {{ p.unit.name }}{% endif %}
            </div>

            <div class="mt-3 d-flex gap-2">
                <a class="ui-btn ui-btn--primary ui-btn--sm" href="{% url 'marketplace:product_detail' p.id %}">View</a>
                <a class="ui-btn ui-btn--outline ui-btn--sm"
                   href="{% url 'marketplace:category' p.category.name|lower|slugify %}">
                    Category
                </a>
            </div>
        </div>
    </div>
</div>
